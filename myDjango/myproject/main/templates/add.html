<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>새 단어 등록</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f8f9fa; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #34495e; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #2c3e50; }
        input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        textarea { height: 150px; resize: none; }
        .submit-btn { width: 100%; padding: 15px; background-color: #2ecc71; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background-color: #27ae60; }
        .cancel-link { display: block; text-align: center; margin-top: 20px; color: #95a5a6; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 용어 기록하기</h1>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="word">용어 이름 (한글)</label>
                <input type="text" id="word" name="word" required placeholder="예: 도커">
            </div>
            <div class="form-group">
                <label for="english_word">영어 표기</label>
                <input type="text" id="english_word" name="english_word" placeholder="예: Docker">
            </div>
            <div class="form-group">
                <label for="easy_explanation">나만의 쉬운 설명</label>
                <textarea id="easy_explanation" name="easy_explanation" required placeholder="비유를 섞어서 적어보세요!"></textarea>
            </div>
            <button type="submit" class="submit-btn">사전에 등록하기</button>
            <a href="{% url 'index' %}" class="cancel-link">취소하고 돌아가기</a>
        </form>
	<form action="/add/" method="post">
    {% csrf_token %}  
</form>
    </div>
</body>
</html>
