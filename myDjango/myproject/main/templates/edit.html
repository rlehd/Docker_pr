<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>용어 수정</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root { --primary: #2d3436; --accent: #0984e3; --bg: #f5f6fa; --text: #2d3436; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); padding: 40px 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 100%; max-width: 500px; }
        h2 { color: var(--primary); margin-top: 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; color: #636e72; }
        input[type="text"], textarea { width: 100%; padding: 10px; border: 1px solid #dfe6e9; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        textarea { height: 120px; resize: vertical; }
        .btn-submit { width: 100%; background: #00b894; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn-submit:hover { background: #00cec9; }
        .btn-cancel { display: block; text-align: center; margin-top: 15px; text-decoration: none; color: #b2bec3; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h2>✏️ 용어 수정하기</h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>용어 이름 (위키백과 연동 때문에 이름은 수정 불가)</label>
                <input type="text" value="{{ term.word }}" disabled style="background-color: #f1f2f6; color: #a4b0be;">
            </div>
            <div class="form-group">
                <label>영어 표기</label>
                <input type="text" name="english_word" value="{{ term.english_word }}">
            </div>
            <div class="form-group">
                <label>나만의 쉬운 설명</label>
                <textarea name="easy_explanation">{{ term.easy_explanation }}</textarea>
            </div>
            <button type="submit" class="btn-submit">수정 완료</button>
            <a href="{% url 'index' %}" class="btn-cancel">취소하고 돌아가기</a>
        </form>
    </div>
</body>
</html>
